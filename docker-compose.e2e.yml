services:
  mysql-e2e:
    image: mysql:8.4
    container_name: trinus-mysql-e2e
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: trinus_e2e
      MYSQL_USER: trinus_e2e
      MYSQL_PASSWORD: trinus_e2e
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 2s
      timeout: 5s
      retries: 30
