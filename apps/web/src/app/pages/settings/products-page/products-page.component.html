<app-crud-page-shell
      [config]="config"
      [backLink]="backLink"
      [backLabel]="backLabel"
      [sectionLabel]="sectionLabel"
      [records]="records"
      [isLoading]="isLoading"
      [isDrawerOpen]="isDrawerOpen"
      [editingRecord]="editingRecord"
      [openedActionsRecordId]="openedActionsRecordId"
      [recordSubtitle]="recordSubtitle"
      (createClicked)="openCreateDrawer()"
      (editClicked)="openEditDrawer($event)"
      (statusClicked)="toggleStatus($event)"
      (deleteClicked)="deleteRecord($event)"
      (toggleActionsMenu)="toggleActionsMenu($event)"
      (closeActionsMenu)="closeActionsMenu()"
      (closeDrawer)="closeDrawer()"
    >
      <form crud-drawer-form class="settings-crud__form" [formGroup]="form" (ngSubmit)="save()" (keydown.enter)="submitFromKeyboard($event)">
        <label class="app-field">
          <span class="app-field__label">Nome</span>
          <input class="app-field__control" type="text" formControlName="name" />
          <app-form-field-error [control]="form.controls.name"></app-form-field-error>
        </label>
        <label class="app-field">
          <span class="app-field__label">Custo do produto</span>
          <input class="app-field__control" type="number" min="0" step="0.01" formControlName="costPrice" />
          <app-form-field-error [control]="form.controls.costPrice"></app-form-field-error>
        </label>
        <label class="app-field">
          <span class="app-field__label">Preco de venda</span>
          <input class="app-field__control" type="number" min="0" step="0.01" formControlName="salePrice" />
          <app-form-field-error [control]="form.controls.salePrice"></app-form-field-error>
        </label>
        <div class="settings-crud__template-items" formArrayName="variableDefaults">
          <p class="settings-crud__result-summary">Variaveis padrao</p>
          <div class="settings-crud__template-item settings-crud__template-item--product-variable" *ngFor="let item of productVariableDefaults.controls; let index = index" [formGroupName]="index">
            <div class="app-field">
              <span class="app-field__label">Variavel {{ index + 1 }}</span>
              <app-searchable-select
                formControlName="variableId"
                [ariaLabel]="'Variavel ' + (index + 1)"
                placeholder="Nenhuma"
                searchPlaceholder="Filtrar variaveis"
                [options]="productVariableOptionsFor(item.get('variableId')?.value)"
              />
            </div>
            <label class="app-field">
              <span class="app-field__label">Valor padrao</span>
              <input class="app-field__control" type="number" min="0.01" step="0.01" formControlName="value" />
            </label>
            <button type="button" class="settings-crud__icon-button" (click)="removeProductVariableDefault(index)" aria-label="Remover variavel padrao" title="Remover">
              <span class="material-symbols-rounded" aria-hidden="true">delete</span>
            </button>
          </div>
          <button type="button" class="app-button app-button--secondary" (click)="addProductVariableDefault()">Adicionar variavel</button>
        </div>
        <label class="settings-crud__checkbox"><input type="checkbox" formControlName="isActive" /> <span>Cadastro ativo</span></label>
        <div class="settings-crud__drawer-actions">
          <button type="button" class="app-button app-button--secondary" (click)="closeDrawer()">Cancelar</button>
          <button type="submit" class="app-button" [disabled]="isSaving">{{ isSaving ? 'Salvando...' : 'Salvar cadastro' }}</button>
        </div>
      </form>
    </app-crud-page-shell>
